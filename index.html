<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NexusOps360 — Operations Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
:root{
  --brand:#4f46e5;--brand-dark:#3730a3;--brand-soft:#eef2ff;
  --bg:#ffffff;--surface:#ffffff;--surface-2:#f8fafc;--surface-3:#f1f5f9;
  --border:#e2e8f0;--border-soft:#f1f5f9;
  --text:#0f172a;--t2:#475569;--t3:#94a3b8;
  --green:#10b981;--green-soft:#d1fae5;
  --orange:#f97316;--orange-soft:#ffedd5;
  --yellow:#eab308;--yellow-soft:#fef9c3;
  --red:#ef4444;--red-soft:#fee2e2;
  --cyan:#0891b2;--cyan-soft:#cffafe;
  --r-sm:4px;--r-md:6px;--r-lg:8px;--r-xl:12px;
  --shadow-sm:0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 6px -1px rgba(15,23,42,.06),0 2px 4px -2px rgba(15,23,42,.04);
  --shadow-lg:0 10px 15px -3px rgba(15,23,42,.08),0 4px 6px -4px rgba(15,23,42,.04);
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Consolas',monospace;
  --t-fast:120ms ease;--t-base:200ms ease;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--brand);text-decoration:none}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
/* LOGIN */
#loginScreen{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(135deg,#eef2ff 0%,#f8fafc 100%);z-index:1000}
.login-card{width:420px;max-width:92vw;background:#fff;border-radius:var(--r-xl);box-shadow:var(--shadow-lg);padding:32px;border:1px solid var(--border)}
.login-brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.login-brand-mark{width:42px;height:42px;border-radius:var(--r-lg);background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px}
.login-brand-text{font-size:20px;font-weight:700;letter-spacing:-.01em}
.login-brand-text small{display:block;font-size:12px;font-weight:500;color:var(--t2);letter-spacing:.04em;text-transform:uppercase;margin-top:2px}
.login-tabs{display:flex;gap:4px;background:var(--surface-3);padding:4px;border-radius:var(--r-md);margin-bottom:16px}
.login-tab{flex:1;padding:8px 12px;border-radius:var(--r-sm);font-size:13px;font-weight:600;color:var(--t2);transition:all var(--t-fast);text-align:center}
.login-tab.active{background:#fff;color:var(--text);box-shadow:var(--shadow-sm)}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase}
.login-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:14px;transition:border-color var(--t-fast)}
.login-input:focus{outline:none;border-color:var(--brand)}
.login-btn{width:100%;padding:11px;background:var(--brand);color:#fff;border-radius:var(--r-md);font-weight:600;font-size:14px;letter-spacing:.02em;transition:background var(--t-fast);margin-top:6px}
.login-btn:hover{background:var(--brand-dark)}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-error{background:var(--red-soft);color:#991b1b;padding:9px 12px;border-radius:var(--r-md);font-size:13px;margin-top:10px;display:none}
.login-footer{margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--t3);text-align:center}
/* APP SHELL */
#app{display:none;height:100vh;flex-direction:column}
#app.ready{display:flex}
.topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0}
.topbar-brand{display:flex;align-items:center;gap:9px}
.topbar-brand-mark{width:30px;height:30px;border-radius:var(--r-md);background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px}
.topbar-brand-text{font-weight:700;font-size:15px;letter-spacing:-.01em}
.topbar-divider{width:1px;height:24px;background:var(--border)}
.module-title{font-weight:600;font-size:14px;color:var(--text);text-transform:uppercase;letter-spacing:.04em}
.topbar-spacer{flex:1}
.topbar-clock{font-family:var(--font-mono);font-size:12px;color:var(--t2);padding:5px 10px;background:var(--surface-3);border-radius:var(--r-sm)}
.topbar-user{display:flex;align-items:center;gap:8px;padding:5px 11px 5px 5px;background:var(--surface-3);border-radius:30px;cursor:pointer;transition:background var(--t-fast)}
.topbar-user:hover{background:var(--brand-soft)}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}
.topbar-user-meta{display:flex;flex-direction:column;line-height:1.2}
.topbar-user-meta b{font-size:12px;font-weight:600}
.topbar-user-meta small{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.topbar-icon-btn{width:32px;height:32px;border-radius:var(--r-md);display:grid;place-items:center;color:var(--t2);transition:all var(--t-fast)}
.topbar-icon-btn:hover{background:var(--surface-3);color:var(--text)}
.tabs{display:flex;gap:2px;padding:0 12px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.tab{padding:12px 16px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all var(--t-fast);display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--text);background:var(--surface-2)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
.content{flex:1;overflow:auto;background:var(--surface-2)}
.module{display:none;padding:18px}
.module.active{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);margin-bottom:14px;align-items:center}
.filter-label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
.filter-input{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:13px;background:#fff;min-width:130px}
.filter-input:focus{outline:none;border-color:var(--brand)}
.filter-apply{padding:7px 14px;background:var(--brand);color:#fff;border-radius:var(--r-md);font-weight:600;font-size:13px}
.filter-apply:hover{background:var(--brand-dark)}
.filter-reset{padding:7px 14px;background:var(--surface-3);color:var(--text);border-radius:var(--r-md);font-weight:600;font-size:13px}
.filter-reset:hover{background:var(--border)}
/* MULTI-SELECT */
.ms{position:relative;min-width:140px}
.ms-trigger{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--r-md);background:#fff;font-size:13px;cursor:pointer;width:100%;text-align:left;color:var(--text)}
.ms-trigger:hover{border-color:var(--brand)}
.ms-trigger.has-value{border-color:var(--brand);background:var(--brand-soft)}
.ms-label{flex:1;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-count{background:var(--brand);color:#fff;font-size:11px;padding:1px 6px;border-radius:8px;font-weight:600}
.ms-caret{color:var(--t3);font-size:10px}
.ms-panel{position:absolute;top:calc(100% + 4px);left:0;min-width:240px;max-width:340px;background:#fff;border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);z-index:100;display:none;overflow:hidden}
.ms.open .ms-panel{display:block}
.ms-search{padding:8px;border-bottom:1px solid var(--border)}
.ms-search input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px}
.ms-actions{display:flex;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border)}
.ms-actions button{font-size:11px;padding:3px 8px;color:var(--brand);font-weight:600;border-radius:var(--r-sm)}
.ms-actions button:hover{background:var(--brand-soft)}
.ms-list{max-height:260px;overflow:auto}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:13px;cursor:pointer;transition:background var(--t-fast)}
.ms-item:hover{background:var(--surface-2)}
.ms-item input{cursor:pointer}
.ms-item.empty{padding:12px;text-align:center;color:var(--t3);font-style:italic}
/* CARDS / KPIs */
.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;box-shadow:var(--shadow-sm);transition:box-shadow var(--t-fast)}
.kpi-card:hover{box-shadow:var(--shadow-md)}
.kpi-label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi-value{font-size:24px;font-weight:800;color:var(--text);font-family:var(--font-mono);letter-spacing:-.01em}
.kpi-value.green{color:var(--green)}
.kpi-value.orange{color:var(--orange)}
.kpi-value.yellow{color:var(--yellow)}
.kpi-value.red{color:var(--red)}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:3px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:14px}
.card-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.card-body{padding:14px}
.card-body.no-pad{padding:0}
/* TABLES */
.tbl-wrap{overflow:auto;max-height:600px;border-radius:var(--r-md)}
table.dt{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
table.dt thead th{background:var(--surface-3);font-weight:700;text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);color:var(--t2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none}
table.dt thead th:hover{background:var(--brand-soft)}
table.dt thead th.no-sort{cursor:default}
table.dt thead th.no-sort:hover{background:var(--surface-3)}
table.dt thead th .sort-ind{margin-left:4px;font-size:10px;color:var(--t3)}
table.dt tbody td{padding:8px 10px;border-bottom:1px solid var(--border-soft);vertical-align:middle}
table.dt tbody tr:hover td{background:var(--surface-2)}
table.dt tbody tr:last-child td{border-bottom:0}
table.dt .num{font-family:var(--font-mono);text-align:right;font-variant-numeric:tabular-nums}
table.dt .center{text-align:center}
table.dt .small{font-size:12px}
.chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700;font-family:var(--font-mono)}
.chip.green{background:var(--green-soft);color:#047857}
.chip.orange{background:var(--orange-soft);color:#9a3412}
.chip.yellow{background:var(--yellow-soft);color:#854d0e}
.chip.red{background:var(--red-soft);color:#991b1b}
.chip.cyan{background:var(--cyan-soft);color:#0e7490}
.chip.gray{background:var(--surface-3);color:var(--t2)}
.tag{display:inline-block;padding:2px 6px;border-radius:var(--r-sm);font-size:11px;font-weight:600;background:var(--surface-3);color:var(--t2)}
.btn{padding:7px 12px;border-radius:var(--r-md);font-weight:600;font-size:13px;transition:all var(--t-fast);display:inline-flex;align-items:center;gap:6px;border:1px solid transparent}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}
.btn-soft{background:var(--surface-3);color:var(--text);border-color:var(--border)}
.btn-soft:hover{background:var(--border-soft);border-color:var(--brand)}
.btn-ghost{color:var(--t2)}
.btn-ghost:hover{background:var(--surface-3);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-sm{padding:4px 8px;font-size:12px}
.pagination{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface-2);font-size:12px;color:var(--t2);flex-wrap:wrap}
.pagination button{padding:4px 10px;border-radius:var(--r-sm);background:#fff;border:1px solid var(--border);font-weight:500}
.pagination button:hover:not(:disabled){background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:var(--r-xl);width:600px;max-width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal.lg{width:840px}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;font-size:15px}
.modal-close{width:28px;height:28px;border-radius:var(--r-md);color:var(--t2);font-size:18px}
.modal-close:hover{background:var(--surface-3);color:var(--text)}
.modal-body{padding:18px;overflow:auto;flex:1}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.form-grid.cols-1{grid-template-columns:1fr}
.form-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:13px;background:#fff;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand)}
.field textarea{resize:vertical;min-height:60px;font-family:inherit}
.field.required label::after{content:' *';color:var(--red)}
.field-help{font-size:11px;color:var(--t3);margin-top:2px}
/* TOAST + LOADING */
#toastHost{position:fixed;bottom:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:11px 16px;border-radius:var(--r-md);box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;animation:slideIn .2s ease;pointer-events:auto;max-width:380px}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warn{background:var(--orange)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}
.loading-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--brand);z-index:9999;transform-origin:left;animation:loadingPulse 1.2s linear infinite;display:none}
.loading-bar.active{display:block}
@keyframes loadingPulse{0%{transform:scaleX(0)}50%{transform:scaleX(.7)}100%{transform:scaleX(1)}}
.empty-state{padding:60px 20px;text-align:center;color:var(--t2)}
.empty-state .em-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:13px;margin-bottom:14px}
.subtabs{display:flex;gap:4px;padding:4px;background:var(--surface-3);border-radius:var(--r-md);margin-bottom:14px;width:fit-content}
.subtab{padding:6px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;transition:all var(--t-fast)}
.subtab.active{background:#fff;color:var(--text);box-shadow:var(--shadow-sm)}
.banner{padding:10px 14px;border-radius:var(--r-md);font-size:13px;margin-bottom:12px}
.banner.warn{background:var(--yellow-soft);color:#854d0e;border:1px solid var(--yellow)}
.banner.info{background:var(--brand-soft);color:#3730a3;border:1px solid var(--brand)}
.banner.error{background:var(--red-soft);color:#991b1b;border:1px solid var(--red)}
/* DOD EXCEL GRID */
.dod-grid-wrap{overflow:auto;max-height:calc(100vh - 360px);border:1px solid var(--border);border-radius:var(--r-md);background:#fff}
table.dod-grid{border-collapse:collapse;font-size:12px;table-layout:fixed;font-family:var(--font-mono)}
table.dod-grid th,table.dod-grid td{border:1px solid var(--border);padding:0;height:26px;overflow:hidden;text-align:left;white-space:nowrap}
table.dod-grid .cell-inner{padding:3px 6px;overflow:hidden;text-overflow:ellipsis}
table.dod-grid .rownum{position:sticky;left:0;z-index:5;background:var(--surface-3);text-align:center;font-weight:700;color:var(--t2);min-width:48px;width:48px}
table.dod-grid thead tr.col-letters th{position:sticky;top:0;z-index:8;background:var(--surface-3);text-align:center;font-weight:700;font-size:11px;color:var(--t2)}
table.dod-grid thead tr.col-letters th:hover{background:var(--brand-soft);cursor:pointer}
table.dod-grid thead tr.col-letters th.col-letter-forward{background:#dbeafe;color:#1e40af}
table.dod-grid thead tr.col-letters th.col-letter-rto{background:#fed7aa;color:#9a3412}
table.dod-grid thead tr.col-letters th.col-letter-separator{background:#cbd5e1}
table.dod-grid tbody tr.frozen-row td{position:sticky;z-index:4;background:var(--surface-2);font-weight:600;font-size:11px;color:var(--t2)}
table.dod-grid tbody tr.frozen-row-1 td{top:26px}
table.dod-grid tbody tr.frozen-row-2 td{top:54px}
table.dod-grid tbody tr.frozen-row-3 td{top:82px}
table.dod-grid tbody tr.frozen-row-4 td{top:110px}
table.dod-grid tbody tr.frozen-row-5 td{top:138px;background:#fef3c7;font-weight:700}
table.dod-grid .col-j{position:sticky;left:48px;z-index:5;background:#fff;font-weight:600;color:var(--text);min-width:200px;width:200px}
table.dod-grid .col-forward{background:#eff6ff}
table.dod-grid .col-rto{background:#fff7ed}
table.dod-grid .col-separator{background:#cbd5e1;min-width:6px;width:6px}
table.dod-grid .col-separator .cell-inner{display:none}
table.dod-grid tbody tr:not(.frozen-row):hover td{background:#fef9c3 !important}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--surface-2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--t3)}
@media (max-width:768px){
  .topbar{padding:0 10px;gap:8px}
  .topbar-brand-text,.module-title{display:none}
  .module{padding:10px}
  .grid-stats{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .filter-bar{padding:8px;gap:6px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-mark">NX</div>
      <div class="login-brand-text">NexusOps360
        <small>Operations Intelligence Platform</small>
      </div>
    </div>
    <div class="login-tabs">
      <div class="login-tab active" data-login="mobile" onclick="setLoginType('mobile')">Mobile</div>
      <div class="login-tab" data-login="email" onclick="setLoginType('email')">Email</div>
    </div>
    <div class="login-field">
      <label id="loginIdLabel">Mobile Number</label>
      <input class="login-input" id="loginId" placeholder="8888888888" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input class="login-input" id="loginPwd" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="off"/>
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In →</button>

function S(v){ return String(v==null?'':v).trim(); }
function N(v){ return typeof v==='number' ? v : (parseFloat(S(v))||0); }
function NUM(v){ return Math.round(+v||0).toLocaleString('en-IN'); }
function PCT(v){ const n=N(v); return n.toFixed(2)+'%'; }
function norm(v){ return S(v).replace(/\s+/g,' ').toUpperCase(); }
function nlc(v){ return S(v).replace(/\s+/g,' ').toLowerCase(); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uniq(arr){ const s={}; arr.forEach(x=>{ if(x!=null && x!=='') s[norm(x)]=S(x); }); return Object.keys(s).sort().map(k=>s[k]); }
function $(id){ return document.getElementById(id); }
function setEl(id, html){ const el=$(id); if(el) el.innerHTML = html; }
function getEl(id){ const el=$(id); return el ? el.value : ''; }
function pad2(n){ return String(n).padStart(2,'0'); }

// Date formatting — dd-mm-yyyy display, ISO yyyy-mm-dd storage
function todayISO(){
  const d=new Date();
  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
}
function fmtDate(iso){
  if(!iso) return '';
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  if(!m) return iso;
  return m[3]+'-'+m[2]+'-'+m[1];
}
function parseAnyDate(v){
  if(!v) return '';
  if(v instanceof Date && !isNaN(v)) return v.getFullYear()+'-'+pad2(v.getMonth()+1)+'-'+pad2(v.getDate());
  const s=S(v);
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const m=/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})/.exec(s);
  if(m){ const y=m[3].length===2?('20'+m[3]):m[3]; return y+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0'); }
  // Excel serial date
  if(/^\d+(\.\d+)?$/.test(s)){
    const n = parseFloat(s);
    if(n>30000 && n<60000){
      const d = new Date(Math.round((n - 25569) * 86400 * 1000));
      return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
    }
  }
  const d=new Date(s);
  if(!isNaN(d)) return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
  return '';
}
function isoToMonth(iso){
  if(!iso) return '';
  const m=/^(\d{4})-(\d{2})/.exec(iso);
  return m ? m[1]+'-'+m[2] : '';
}

/* ═══════════════════════════════════════════════════════════════════════
   5. FROZEN BUSINESS LOGIC — copied verbatim from v35.4.2

// CD facility — bagging is N/A
function isCDType(t){ return /^(FM|LM)-CD$/i.test(t||''); }
function normalizeCDBagging(rec){ if(isCDType(rec.type)){ rec.bagging = 0; } return rec; }

// Tier colour bands — 98 / 95 / 90 / <90
function tierClass(v){
  v = N(v);
  if(v >= 98) return 'green';
  if(v >= 95) return 'orange';
  if(v >= 90) return 'yellow';
  return 'red';
}
function tierColor(v){
  v = N(v);
  if(v >= 98) return 'var(--green)';
  if(v >= 95) return 'var(--orange)';
  if(v >= 90) return 'var(--yellow)';
  return 'var(--red)';
}

// v32: <100% conn = breach
function calcBreach(volume, connection){
  const v = N(volume), c = N(connection);
  if(c >= 100 || v <= 0) return 0;
  return Math.round(v - (v * c / 100));
}

function isFail(r){
  if(N(r.connection) < 100) return true;
  if(isCDType(r.type)) return false;
  return N(r.bagging) < 100;
}

function compKey(r){ return S(r.date) + '_' + norm(r.facility); }

function getExcData(date, facility){
  const fNorm = norm(facility), dStr = S(date);
  const codQty = State.cod.filter(r => r.date===dStr && norm(r.facility)===fNorm)
                         .reduce((s,r)=>s+N(r.cod_qty),0);
  const rlhQty = State.rlhCallouts.filter(r =>
    r.date===dStr && norm(r.facility)===fNorm &&
    RLH_POSITIVE_EXCEPTIONS.indexOf(r.failure_reason)>=0
  ).reduce((s,r)=>s+N(r.affected_qty),0);
  const reasons = [];
  if(codQty>0) reasons.push('COD: '+NUM(codQty));
  if(rlhQty>0){
    const types = State.rlhCallouts.filter(r =>
      r.date===dStr && norm(r.facility)===fNorm &&
      RLH_POSITIVE_EXCEPTIONS.indexOf(r.failure_reason)>=0
    ).map(r=>r.failure_reason);
    reasons.push('RLH ('+uniq(types).join('+')+': '+NUM(rlhQty)+')');
  }
  return {codQty, rlhQty, excQty: codQty+rlhQty, reasons};
}

function calcExcConn(r){
  const vol = N(r.volume);
  if(vol<=0) return N(r.connection);
  const actualPct = N(r.connection);
  const ontime = vol * actualPct / 100;
  const exc = getExcData(r.date, r.facility);
  let finalConnected = Math.min(vol, ontime + exc.excQty);
  let excPct = finalConnected / vol * 100;
  if(excPct < actualPct) excPct = actualPct;
  if(excPct > 100) excPct = 100;
  return +excPct.toFixed(2);
}

// v20 canonical aggregation — volume-weighted, Exc >= Actual invariant
function aggCompliance(rows){
  const days = {}, facs = {};
  let totVol = 0, connectedVol = 0, excCount = 0;
  let bagSum = 0, bagN = 0, breachQty = 0;
  let failDays = 0, n = 0;
  rows.forEach(r => {
    days[r.date] = 1; facs[r.facility] = 1;
    const vol = N(r.volume);
    totVol += vol;
    connectedVol += vol * N(r.connection) / 100;
    const exc = getExcData(r.date, r.facility);
    excCount += exc.excQty;
    if(!isCDType(r.type)){ bagSum += N(r.bagging); bagN++; }
    breachQty += calcBreach(r.volume, r.connection);
    if(isFail(r)) failDays++;
    n++;
  });
  let actualPct = totVol > 0 ? (connectedVol / totVol * 100) : 0;
  const finalConnected = Math.min(totVol, connectedVol + excCount);
  let excPct = totVol > 0 ? (finalConnected / totVol * 100) : 0;
  if(excPct < actualPct) excPct = actualPct;
  if(excPct > 100) excPct = 100;
  if(actualPct > 100) actualPct = 100;
  actualPct = Math.round(actualPct * 100) / 100;
  excPct    = Math.round(excPct    * 100) / 100;
  let avgBag = bagN ? Math.round((bagSum / bagN) * 100) / 100 : 0;
  if(avgBag > 100) avgBag = 100;
  const compPct = n > 0 ? Math.round(((n - failDays) / n * 100) * 100) / 100 : 0;
  return {
    totalDays: Object.keys(days).length, totalSC: Object.keys(facs).length,
    records: n, totVol,
    connectedVol: Math.round(connectedVol),
    avgConn: actualPct, actualComp: actualPct,
    excComp: excPct, excCount,
    finalConnected: Math.round(finalConnected),
    avgBag, breachQty, compPct
  };
}

function isExcPass(r){ return calcExcConn(r) >= 98; }

function normRec(rec){
  ['facility','rh','ch','zh','zone','type','partner','origin','lane'].forEach(f=>{
    if(rec[f]) rec[f] = norm(rec[f]);
  });
  return rec;
}

function initSupabase(){
  if(SUPABASE_URL==='YOUR_SUPABASE_URL_HERE' || SUPABASE_ANON==='YOUR_SUPABASE_ANON_KEY_HERE'){
    console.warn('[NX] Supabase credentials not configured');
    return false;
  }
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
    });
    return true;
  }catch(e){
    console.error('[NX] Supabase init failed', e);
    return false;
  }
}

const API = {
  async listAll(table, opts){
    opts = opts || {};
    if(!sb) return [];
    let all = [], from = 0, size = 1000;
    while(true){
      let q = sb.from(table).select('*').range(from, from + size - 1);
      if(opts.orderBy) q = q.order(opts.orderBy, { ascending: opts.ascending!==false });
      const { data, error } = await q;
      if(error){ console.error('[API.listAll]', table, error.message); break; }
      all = all.concat(data||[]);
      if(!data || data.length < size) break;
      from += size;
    }
    return all;
  },
  async upsert(table, rec){
    if(!sb) return { error: 'not_connected' };
    const { data, error } = await sb.from(table).upsert(rec).select();
    if(error) console.error('[API.upsert]', table, error.message);
    return { data, error };
  },
  async insert(table, rec){
    if(!sb) return { error: 'not_connected' };
    const { data, error } = await sb.from(table).insert(rec).select();
    if(error) console.error('[API.insert]', table, error.message);
    return { data, error };
  },
  async update(table, id, patch, idCol){
    if(!sb) return { error: 'not_connected' };
    const { data, error } = await sb.from(table).update(patch).eq(idCol||'id', id).select();
    if(error) console.error('[API.update]', table, error.message);
    return { data, error };
  },
  async remove(table, id, idCol){
    if(!sb) return { error: 'not_connected' };
    const { error } = await sb.from(table).delete().eq(idCol||'id', id);
    if(error) console.error('[API.remove]', table, error.message);
    return { error };
  }
};

function setLoginType(t){
  State.loginType = t;
  document.querySelectorAll('.login-tab').forEach(el=>{
    el.classList.toggle('active', el.dataset.login===t);
  });
  $('loginIdLabel').textContent = t==='mobile' ? 'Mobile Number' : 'Email Address';
  $('loginId').placeholder = t==='mobile' ? '8888888888' : 'name@nexusops360.com';
  $('loginId').focus();
}

async function doLogin(){
  const id = S(getEl('loginId'));
  const pwd = S(getEl('loginPwd'));
  const errBox = $('loginErr');
  errBox.style.display = 'none';
  if(!id || !pwd){ errBox.textContent = 'Please enter credentials.'; errBox.style.display='block'; return; }
  if(!sb){ errBox.textContent = 'Application not connected. Check Supabase credentials in source.'; errBox.style.display='block'; return; }
  const btn = $('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try{
    let email = id;
    if(State.loginType==='mobile'){
      // Look up email by mobile
      const { data, error } = await sb.from('user_profiles').select('email,active').eq('mobile', id).maybeSingle();
      if(error || !data){ throw new Error('User not found. Check mobile number.'); }
      if(data.active===false){ throw new Error('Account deactivated. Contact administrator.'); }
      email = data.email;
    }
    const { data: signin, error: signErr } = await sb.auth.signInWithPassword({ email, password: pwd });
    if(signErr) throw new Error(signErr.message||'Invalid credentials.');
    // Load profile
    const { data: profile, error: profErr } = await sb.from('user_profiles').select('*').eq('id', signin.user.id).single();
    if(profErr || !profile) throw new Error('Profile not found. Contact administrator.');
    if(profile.active===false) throw new Error('Account deactivated.');
    State.user = profile;
    cacheUser(profile);
    audit('login', 'auth', 'Signed in via '+State.loginType);
    await afterLogin();
  }catch(e){
    errBox.textContent = e.message || 'Login failed.';
    errBox.style.display='block';
  }finally{
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

function cacheUser(p){
  try{ localStorage.setItem('nx_user_cache', JSON.stringify({id:p.id,name:p.name,email:p.email,mobile:p.mobile,role:p.role,zone:p.zone,ch:p.ch,locations:p.locations,ts:Date.now()})); }catch(e){}
}
function hydrateUserFromCache(){
  try{
    const raw = localStorage.getItem('nx_user_cache');
    if(!raw) return null;
    const p = JSON.parse(raw);
    if(Date.now()-p.ts > 7*24*60*60*1000) return null;
    return p;
  }catch(e){ return null; }
}

async function doLogout(){
  audit('logout','auth','');
  try{ if(sb) await sb.auth.signOut(); }catch(e){}
  try{ localStorage.removeItem('nx_user_cache'); }catch(e){}
  State.user = null;
  unsubscribeAllRealtime();

async function tryRestoreSession(){
  if(!sb) return false;
  // Fast-boot from cache
  const cached = hydrateUserFromCache();
  if(cached){
    // Optimistically render the shell from cache while we verify session
    State.user = cached;
  }
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ State.user = null; return false; }
  // Re-fetch fresh profile
  const { data: profile, error } = await sb.from('user_profiles').select('*').eq('id', session.user.id).single();
  if(error || !profile || profile.active===false){ State.user = null; return false; }
  State.user = profile;
  cacheUser(profile);
  await afterLogin();
  return true;
}

/* ═══════════════════════════════════════════════════════════════════════
   11. REALTIME
   ═══════════════════════════════════════════════════════════════════════ */
function subscribeRealtime(){
  if(!sb) return;
  unsubscribeAllRealtime();
  const tables = ['compliance','breach_rca','callouts','cod_data','rlh_callouts','master_facility','dod_uploads'];
  tables.forEach(table=>{
    const ch = sb.channel('rt:'+table).on('postgres_changes', { event:'*', schema:'public', table }, (payload)=>{
      onRealtimeEvent(table, payload);
    }).subscribe();
    State._channels.push(ch);
  });
}
function unsubscribeAllRealtime(){
  if(!sb) return;
  State._channels.forEach(ch=>{ try{ sb.removeChannel(ch); }catch(e){} });
  State._channels = [];
}
function onRealtimeEvent(table, payload){
  const stateKey = { compliance:'compliance', breach_rca:'breachRCA', callouts:'callouts', cod_data:'cod', rlh_callouts:'rlhCallouts', master_facility:'master', dod_uploads:'dodIndex' }[table];
  if(!stateKey) return;
  const arr = State[stateKey];
  const idField = (table==='dod_uploads') ? 'report_date' : 'id';
  if(payload.eventType==='INSERT'){
    if(!arr.find(x=>x[idField]===payload.new[idField])) arr.unshift(payload.new);
  } else if(payload.eventType==='UPDATE'){
    const i = arr.findIndex(x=>x[idField]===payload.new[idField]);
    if(i>=0) arr[i] = payload.new; else arr.unshift(payload.new);
  } else if(payload.eventType==='DELETE'){
    const i = arr.findIndex(x=>x[idField]===payload.old[idField]);
    if(i>=0) arr.splice(i,1);
  }
  // Re-render current tab if affected
  renderActiveModule();
}

/* ═══════════════════════════════════════════════════════════════════════
   13. MULTI-SELECT COMPONENT
   ═══════════════════════════════════════════════════════════════════════ */
function msBuild(id, opts, placeholder){
  State._ms[id] = State._ms[id] || [];
  const sel = State._ms[id];
  const cnt = sel.length;
  return `<div class="ms ${cnt?'open-state':''}" id="${id}" data-opts='${JSON.stringify(opts)}'>
    <button class="ms-trigger ${cnt?'has-value':''}" onclick="msToggle('${id}',event)">
      <span class="ms-label">${cnt ? (cnt===1?sel[0]:cnt+' selected') : (placeholder||'All')}</span>
      ${cnt ? `<span class="ms-count">${cnt}</span>` : ''}
      <span class="ms-caret">▼</span>
    </button>
    <div class="ms-panel">
      <div class="ms-search"><input type="text" placeholder="Search…" oninput="msFilter('${id}', this.value)"/></div>
      <div class="ms-actions">
        <button onclick="msAll('${id}')">Select All</button>
        <button onclick="msClear('${id}')">Clear</button>
      </div>
      <div class="ms-list">${msRenderItems(id, opts, '')}</div>
    </div>
  </div>`;
}
function msRenderItems(id, opts, search){
  const sel = State._ms[id]||[];
  const q = (search||'').toLowerCase();
  const filtered = q ? opts.filter(o=>String(o).toLowerCase().includes(q)) : opts;
  if(!filtered.length) return '<div class="ms-item empty">No matches</div>';
  return filtered.map(o=>{
    const checked = sel.indexOf(o)>=0 ? 'checked' : '';
    return `<label class="ms-item"><input type="checkbox" ${checked} onclick="msToggleItem('${id}','${esc(o).replace(/'/g,"\\'")}')"/>${esc(o)}</label>`;
  }).join('');
}
function msFilter(id, search){
  const el = $(id); if(!el) return;
  const opts = JSON.parse(el.getAttribute('data-opts')||'[]');
  el.querySelector('.ms-list').innerHTML = msRenderItems(id, opts, search);
}
function msToggle(id, ev){
  if(ev) ev.stopPropagation();
  document.querySelectorAll('.ms.open').forEach(el=>{ if(el.id!==id) el.classList.remove('open'); });
  $(id).classList.toggle('open');
}
function msToggleItem(id, val){
  const sel = State._ms[id] = State._ms[id]||[];
  const i = sel.indexOf(val);
  if(i>=0) sel.splice(i,1); else sel.push(val);
  msUpdateTrigger(id);
}
function msAll(id){
  const el = $(id); if(!el) return;
  const opts = JSON.parse(el.getAttribute('data-opts')||'[]');
  State._ms[id] = opts.slice();
  msFilter(id, el.querySelector('.ms-search input').value);
  msUpdateTrigger(id);
}
function msClear(id){
  State._ms[id] = [];
  const el = $(id); if(!el) return;
  msFilter(id, el.querySelector('.ms-search input').value);
  msUpdateTrigger(id);
}
function msUpdateTrigger(id){
  const el = $(id); if(!el) return;
  const trig = el.querySelector('.ms-trigger');
  const sel = State._ms[id]||[];
  const cnt = sel.length;
  trig.classList.toggle('has-value', cnt>0);
  trig.querySelector('.ms-label').textContent = cnt ? (cnt===1?sel[0]:cnt+' selected') : (trig.getAttribute('data-placeholder')||'All');
  const countEl = trig.querySelector('.ms-count');
  if(cnt && !countEl) trig.insertBefore(Object.assign(document.createElement('span'),{className:'ms-count',textContent:cnt}), trig.querySelector('.ms-caret'));
  else if(!cnt && countEl) countEl.remove();
  else if(countEl) countEl.textContent = cnt;
}
function getMS(id){ return State._ms[id]||[]; }
function resetMS(id){ State._ms[id]=[]; msUpdateTrigger(id); }

// Close ms on outside click
document.addEventListener('click', (e)=>{
  if(!e.target.closest('.ms')) document.querySelectorAll('.ms.open').forEach(el=>el.classList.remove('open'));
});

/* ═══════════════════════════════════════════════════════════════════════
   14. GLOBAL FILTER BAR
   ═══════════════════════════════════════════════════════════════════════ */
function buildGlobalFilterBars(){
  // Each module that uses the global filter calls buildFilterBar(containerId, prefix)
  // Implementation lives in the module renderers
}

function applyGlobalFilters(prefix, rows){
  // prefix is the filter scope (d=dash, c=comp, r=rank, etc) — we use one global scope 'g'
  const dateFrom = getEl(prefix+'_dateFrom');
  const dateTo   = getEl(prefix+'_dateTo');
  const monthSel = getEl(prefix+'_month');
  const zones    = getMS(prefix+'_zones');
  const rhs      = getMS(prefix+'_rhs');
  const chs      = getMS(prefix+'_chs');
  const zhs      = getMS(prefix+'_zhs');
  const types    = getMS(prefix+'_types');

  return rows.filter(r=>{
    if(monthSel && isoToMonth(r.date)!==monthSel) return false;
    if(dateFrom && r.date < dateFrom) return false;
    if(dateTo && r.date > dateTo) return false;
    // Resolve zone/rh/ch via master if not on record
    let zone=r.zone, rh=r.rh, ch=r.ch, zh=r.zh, type=r.type;
    if(!zone || !rh || !ch || !zh || !type){
      const f = findFacility(r.facility);
      if(f){ zone=zone||f.zone; rh=rh||f.rh; ch=ch||f.ch; zh=zh||f.zh; type=type||f.facility_type; }
    }
    if(zones.length && zones.indexOf(zone)<0) return false;
    if(rhs.length && rhs.indexOf(rh)<0) return false;
    if(chs.length && chs.indexOf(ch)<0) return false;
    if(zhs.length && zhs.indexOf(zh)<0) return false;
    if(types.length && types.indexOf(type)<0) return false;
    return true;
  });
}

function buildFilterBar(containerId, prefix, onApply){
  const c = $(containerId); if(!c) return;
  const zones = uniq(State.master.map(m=>m.zone).concat(State.compliance.map(r=>r.zone)));
  const rhs   = uniq(State.master.map(m=>m.rh).concat(State.compliance.map(r=>r.rh)));
  const chs   = uniq(State.master.map(m=>m.ch).concat(State.compliance.map(r=>r.ch)));
  const zhs   = uniq(State.master.map(m=>m.zh).concat(State.compliance.map(r=>r.zh)));
  const types = FACILITY_TYPES.slice();
  // Months derived from compliance dates
  const months = uniq(State.compliance.map(r=>isoToMonth(r.date)));
  c.innerHTML = `<div class="filter-bar">
    <span class="filter-label">Date From</span>
    <input type="date" class="filter-input" id="${prefix}_dateFrom"/>
    <span class="filter-label">Date To</span>
    <input type="date" class="filter-input" id="${prefix}_dateTo"/>
    <span class="filter-label">Month</span>
    <select class="filter-input" id="${prefix}_month"><option value="">All</option>${months.map(m=>`<option value="${m}">${m}</option>`).join('')}</select>
    <span class="filter-label">Zone</span>${msBuild(prefix+'_zones', zones, 'All Zones')}
    <span class="filter-label">RH</span>${msBuild(prefix+'_rhs', rhs, 'All RH')}
    <span class="filter-label">CH</span>${msBuild(prefix+'_chs', chs, 'All CH')}
    <span class="filter-label">ZH</span>${msBuild(prefix+'_zhs', zhs, 'All ZH')}
    <span class="filter-label">Type</span>${msBuild(prefix+'_types', types, 'All Types')}
    <button class="filter-apply" onclick="(${onApply.toString()})()">Apply</button>
    <button class="filter-reset" onclick="resetFilters('${prefix}'); (${onApply.toString()})()">Reset</button>
  </div>`;
}
function resetFilters(prefix){
  ['_dateFrom','_dateTo','_month'].forEach(s=>{ const el=$(prefix+s); if(el) el.value=''; });
  ['_zones','_rhs','_chs','_zhs','_types'].forEach(s=>resetMS(prefix+s));
}

/* ═══════════════════════════════════════════════════════════════════════
   15. SORTABLE TABLE HELPER
   ═══════════════════════════════════════════════════════════════════════ */
function sortRows(prefix, rows, getters){
  const s = State._sort[prefix];
  if(!s || !s.col) return rows;
  const g = getters[s.col];
  if(!g) return rows;
  const sorted = rows.slice().sort((a,b)=>{
    const va = g(a), vb = g(b);
    if(typeof va==='number' && typeof vb==='number') return s.dir==='asc' ? va-vb : vb-va;
    return s.dir==='asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  return sorted;
}
function sortToggle(prefix, col, rerenderFn){
  const cur = State._sort[prefix]||{};
  let dir = 'asc';
  if(cur.col===col && cur.dir==='asc') dir='desc';
  else if(cur.col===col && cur.dir==='desc') dir='';
  State._sort[prefix] = dir ? { col, dir } : { col:'', dir:'' };
  if(rerenderFn) rerenderFn();
}
function sortInd(prefix, col){
  const s = State._sort[prefix]||{};
  if(s.col!==col) return '';
  return `<span class="sort-ind">${s.dir==='asc'?'▲':'▼'}</span>`;
}

/* ═══════════════════════════════════════════════════════════════════════
   16. EXPORT TO XLSX
   ═══════════════════════════════════════════════════════════════════════ */
function exportXLSX(rows, headers, filename){
  if(!rows || !rows.length){ toast('No data to export', 'warn'); return; }
  const wsData = [headers].concat(rows);
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Data');
  XLSX.writeFile(wb, filename + '_' + todayISO() + '.xlsx');
}

  setEl('dash_botTbl', `<table class="dt"><thead><tr><th class="no-sort">#</th><th class="no-sort">Facility</th><th class="no-sort">RH</th><th class="no-sort">Conn%</th><th class="no-sort">Bag%</th><th class="no-sort">Breach Qty</th></tr></thead><tbody>${botRowsH}</tbody></table>`);

  // Top offenders
  const offenders = rows.filter(r=>calcBreach(r.volume,r.connection)>0).sort((a,b)=>calcBreach(b.volume,b.connection)-calcBreach(a.volume,a.connection)).slice(0,15);
  const offRows = offenders.map((r,i)=>`<tr><td class="num">${i+1}</td><td>${fmtDate(r.date)}</td><td>${esc(r.facility)}</td><td>${esc(r.type||'')}</td><td>${esc(r.partner||'')}</td><td>${esc(r.rh||'')}</td><td class="num">${NUM(r.volume)}</td><td class="num"><span class="chip ${tierClass(r.connection)}">${PCT(r.connection)}</span></td><td class="num red">${NUM(calcBreach(r.volume,r.connection))}</td></tr>`).join('') || '<tr><td colspan="9" class="center" style="padding:20px;color:var(--t3)">No breaches in scope 🎉</td></tr>';
  setEl('dash_offTbl', `<table class="dt"><thead><tr><th class="no-sort">#</th><th class="no-sort">Date</th><th class="no-sort">Facility</th><th class="no-sort">Type</th><th class="no-sort">Partner</th><th class="no-sort">RH</th><th class="no-sort">Volume</th><th class="no-sort">Conn%</th><th class="no-sort">Breach Qty</th></tr></thead><tbody>${offRows}</tbody></table>`);

  // Achievement bands
  const bands = facStats.map(s=>{
    const recs = byFac[s.facility];
    let g=0,o=0,y=0,r=0;
    recs.forEach(x=>{
      const c = N(x.connection);
      if(c>=98) g++; else if(c>=95) o++; else if(c>=90) y++; else r++;
    });
    const total = recs.length;
    return { facility:s.facility, rh:recs[0].rh||'', ch:recs[0].ch||'', g, o, y, r, total, greenPct: total?g/total*100:0 };
  }).sort((a,b)=>b.greenPct-a.greenPct);
  const bandsH = bands.slice(0,30).map(b=>`<tr><td>${esc(b.facility)}</td><td>${esc(b.rh)}</td><td>${esc(b.ch)}</td><td class="num"><span class="chip green">${b.g}</span></td><td class="num"><span class="chip orange">${b.o}</span></td><td class="num"><span class="chip yellow">${b.y}</span></td><td class="num"><span class="chip red">${b.r}</span></td><td class="num">${b.total}</td><td class="num"><span class="chip ${tierClass(b.greenPct)}">${b.greenPct.toFixed(1)}%</span></td></tr>`).join('') || '<tr><td colspan="9" class="center" style="padding:20px;color:var(--t3)">No data</td></tr>';
  setEl('dash_bandsTbl', `<table class="dt"><thead><tr><th class="no-sort">Facility</th><th class="no-sort">RH</th><th class="no-sort">CH</th><th class="no-sort">🟢 98-100%</th><th class="no-sort">🟠 95-97.99%</th><th class="no-sort">🟡 90-94.99%</th><th class="no-sort">🔴 &lt;90%</th><th class="no-sort">Total</th><th class="no-sort">Green %</th></tr></thead><tbody>${bandsH}</tbody></table>`);

  // AI suggestions
  const ai = [];
  facStats.filter(s=>s.actualComp<90).slice(0,3).forEach(s=>ai.push(`<div class="banner warn">⚠️ <b>${esc(s.facility)}</b> compliance ${PCT(s.actualComp)} — schedule on-ground audit.</div>`));
  // RCA category concentration
  const rcaTotal = State.breachRCA.length;
  if(rcaTotal>10){
    const cat = {};
    State.breachRCA.forEach(b=>cat[b.category]=(cat[b.category]||0)+1);
    const sorted = Object.keys(cat).sort((a,b)=>cat[b]-cat[a]);
    if(sorted.length){
      const pct = cat[sorted[0]]/rcaTotal*100;
      if(pct>30) ai.push(`<div class="banner info">💡 <b>${esc(sorted[0])}</b> accounts for ${pct.toFixed(0)}% of RCA — root-cause workshop recommended.</div>`);
    }
  }
  setEl('dash_ai', ai.length?ai.join(''):'<div class="empty-state"><div class="em-icon">🎯</div><h3>All clear</h3><p>No anomalies detected in the current scope.</p></div>');
}
function dashExportTop(){
  const rows = applyGlobalFilters('dg', State.compliance);
  const byFac = {};

function renderComplianceTable(){
  const rows = applyGlobalFilters('cg', State.compliance);
  // Sort
  const sorted = sortRows('comp', rows, {
    date:r=>r.date, facility:r=>r.facility, type:r=>r.type,
    volume:r=>N(r.volume), connection:r=>N(r.connection), bagging:r=>N(r.bagging),
    breach:r=>calcBreach(r.volume,r.connection), excComp:r=>calcExcConn(r)
  });
  // Paginate
  State._page.comp = State._page.comp || { p:1, sz:50 };
  const pg = State._page.comp;
  const total = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total/pg.sz));
  if(pg.p > totalPages) pg.p = totalPages;
  const start = (pg.p-1)*pg.sz, end = Math.min(start+pg.sz, total);
  const slice = sorted.slice(start, end);
  const sh = c=>`onclick="sortToggle('comp','${c}',renderComplianceTable)"`;
  const head = `<thead><tr>
    <th ${sh('date')}>Date${sortInd('comp','date')}</th>
    <th ${sh('facility')}>Facility${sortInd('comp','facility')}</th>
    <th ${sh('type')}>Type${sortInd('comp','type')}</th>
    <th class="no-sort">Partner</th>
    <th class="no-sort">RH</th>
    <th ${sh('volume')}>Volume${sortInd('comp','volume')}</th>
    <th ${sh('connection')}>Conn%${sortInd('comp','connection')}</th>
    <th ${sh('bagging')}>Bag%${sortInd('comp','bagging')}</th>
    <th ${sh('excComp')}>⭐Exc.Conn%${sortInd('comp','excComp')}</th>
    <th ${sh('breach')}>Breach${sortInd('comp','breach')}</th>
    <th class="no-sort">Action</th>
  </tr></thead>`;
  const body = slice.map(r=>{
    const ex = calcExcConn(r);
    return `<tr>
      <td class="small">${fmtDate(r.date)}</td>
      <td><b>${esc(r.facility)}</b></td>
      <td>${esc(r.type||'')}</td>
      <td class="small">${esc(r.partner||'')}</td>
      <td class="small">${esc(r.rh||'')}</td>
      <td class="num">${NUM(r.volume)}</td>
      <td class="num"><span class="chip ${tierClass(r.connection)}">${PCT(r.connection)}</span></td>
      <td class="num">${isCDType(r.type)?'<span class="tag">N/A</span>':'<span class="chip '+tierClass(r.bagging)+'">'+PCT(r.bagging)+'</span>'}</td>
      <td class="num">${ex>N(r.connection)?'<span class="chip cyan">'+PCT(ex)+'</span>':PCT(ex)}</td>
      <td class="num red">${NUM(calcBreach(r.volume,r.connection))}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="compEdit('${esc(r.id)}')">✎</button>${State.user.role!=='user'?'<button class="btn btn-ghost btn-sm" onclick="compDelete(\''+esc(r.id)+'\')">🗑</button>':''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="11" class="center" style="padding:20px;color:var(--t3)">No records</td></tr>';
  setEl('comp_tbl', `<table class="dt">${head}<tbody>${body}</tbody></table>`);
  setEl('comp_pgn', `<div class="pagination"><span>${start+1}–${end} of ${total}</span><button onclick="compPage(-1)" ${pg.p<=1?'disabled':''}>← Prev</button><span>Page ${pg.p} of ${totalPages}</span><button onclick="compPage(1)" ${pg.p>=totalPages?'disabled':''}>Next →</button></div>`);
}
function compPage(d){ State._page.comp.p += d; renderComplianceTable(); }
function compEdit(id){

    <div class="field required"><label>Date</label><input type="date" id="cm_date" value="${esc(r.date)}"/></div>
    <div class="field required"><label>Facility</label><select id="cm_facility" onchange="compAutoFill()"><option value="">— Select —</option>${facOpts}</select></div>
    <div class="field required"><label>Type</label><select id="cm_type">${FACILITY_TYPES.map(t=>`<option ${t===r.type?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="field"><label>Partner</label><input id="cm_partner" value="${esc(r.partner||'')}"/></div>
    <div class="field required"><label>Volume</label><input type="number" id="cm_volume" value="${N(r.volume)}" min="0"/></div>

  </div>`;
  modal({ title: (id?'Edit':'Add') + ' Compliance Record', body, actions:[
    { label:'Cancel', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Save', class:'btn-primary', onclick:m=>compSave(id, m) }
  ]});
}
function compAutoFill(){
  const code = getEl('cm_facility');
  const f = findFacility(code);
  if(f){
    $('cm_type').value = f.facility_type;
    $('cm_partner').value = f.partner||'';
    if(isCDType(f.facility_type)) $('cm_bagging').value = 0;
  }
}
async function compSave(id, modalEl){
  const facCode = S(getEl('cm_facility'));
  if(!facCode){ toast('Pick a facility','error'); return; }
  const rec = {
    date: parseAnyDate(getEl('cm_date')),
    facility: norm(facCode),
    type: getEl('cm_type'),
    partner: S(getEl('cm_partner')),
    volume: N(getEl('cm_volume')),
    matured: N(getEl('cm_matured')),
    connection: N(getEl('cm_connection')),
    bagging: N(getEl('cm_bagging'))
  };
  normalizeCDBagging(rec);
  rec.id = compKey(rec);
  // Enrich from master
  const f = findFacility(rec.facility);
  if(f){ rec.zone=f.zone; rec.rh=f.rh; rec.ch=f.ch; rec.zh=f.zh; if(!rec.partner) rec.partner=f.partner; }
  rec.updated_by = State.user.id;
  rec.updated_at = new Date().toISOString();
  if(!id) rec.created_by = State.user.id;
  loadingStart();
  const { error } = await API.upsert('compliance', rec);
  loadingStop();
  if(error){ toast('Save failed: '+error.message,'error'); return; }
  // Update local state immediately
  const idx = State.compliance.findIndex(x=>x.id===rec.id);
  if(idx>=0) State.compliance[idx] = rec; else State.compliance.unshift(rec);
  audit(id?'update':'create','compliance', rec.facility+' · '+rec.date);
  toast('Saved','success');
  modalEl.remove();
  renderComplianceTable();
}
async function compDelete(id){
  if(!confirm('Delete this compliance record? Linked RCA will also be deleted.')) return;
  loadingStart();
  const { error } = await API.remove('compliance', id);
  loadingStop();
  if(error){ toast('Delete failed','error'); return; }
  State.compliance = State.compliance.filter(x=>x.id!==id);
  State.breachRCA = State.breachRCA.filter(b=>b.compliance_id!==id);
  audit('delete','compliance', id);
  toast('Deleted','success');
  renderComplianceTable();
}

function compShowPaste(){
  const body = `<div class="field"><label>Paste tab-separated rows (date<TAB>facility<TAB>type<TAB>partner<TAB>volume<TAB>matured<TAB>connection<TAB>bagging)</label>
    <textarea id="paste_box" rows="10" style="font-family:var(--font-mono);font-size:12px"></textarea>
    <div class="field-help">First line can be headers. Dates accepted as yyyy-mm-dd or dd-mm-yyyy.</div></div>`;
  modal({ title:'Quick Paste Compliance', body, size:'lg', actions:[
    { label:'Cancel', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Parse & Insert', class:'btn-primary', onclick:m=>compParsePaste(m) }
  ]});
}
async function compParsePaste(modalEl){
  const raw = $('paste_box').value;
  const lines = raw.split('\n').filter(l=>l.trim());
  if(!lines.length){ toast('No data','error'); return; }
  const recs = [];
  lines.forEach((line,i)=>{
    const cells = line.split(/\t|,/).map(c=>c.trim());
    if(i===0 && /date/i.test(cells[0])) return;
    if(cells.length<5) return;
    const rec = {
      date: parseAnyDate(cells[0]),
      facility: norm(cells[1]),
      type: cells[2]||'',
      partner: cells[3]||'',
      volume: N(cells[4]),
      matured: cells.length>=6?N(cells[5]):0,
      connection: cells.length>=7?N(cells[6]):N(cells[5]),
      bagging: cells.length>=8?N(cells[7]):0
    };
    if(rec.date && rec.facility && rec.volume>=0){
      normalizeCDBagging(rec);
      rec.id = compKey(rec);
      const f = findFacility(rec.facility);
      if(f){ rec.zone=f.zone; rec.rh=f.rh; rec.ch=f.ch; rec.zh=f.zh; if(!rec.partner) rec.partner=f.partner; if(!rec.type) rec.type=f.facility_type; }
      rec.updated_by=State.user.id; rec.updated_at=new Date().toISOString(); rec.created_by=State.user.id;
      recs.push(rec);
    }
  });
  if(!recs.length){ toast('No valid rows parsed','error'); return; }
  loadingStart();
  const { error } = await API.upsert('compliance', recs);
  loadingStop();
  if(error){ toast('Bulk insert failed: '+error.message,'error'); return; }
  recs.forEach(rec=>{
    const idx = State.compliance.findIndex(x=>x.id===rec.id);
    if(idx>=0) State.compliance[idx] = rec; else State.compliance.unshift(rec);
  });
  audit('bulk_paste','compliance', recs.length+' records');
  toast(recs.length+' records imported','success');
  modalEl.remove();
  renderComplianceTable();
}
function compBulkUpload(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval:'' });
      if(!rows.length){ toast('Empty file','error'); return; }
      const recs = [];
      rows.forEach(row=>{
        const facility = norm(row.facility||row.Facility||row.FACILITY||'');
        const date = parseAnyDate(row.date||row.Date||row.DATE||'');
        if(!facility || !date) return;
        const rec = {
          date, facility,
          type: row.type||row.Type||'',
          partner: row.partner||row.Partner||'',
          volume: N(row.volume||row.Volume),
          matured: N(row.matured||row.Matured),
          connection: N(row.connection||row.Connection),
          bagging: N(row.bagging||row.Bagging)
        };
        normalizeCDBagging(rec);
        rec.id = compKey(rec);
        const f = findFacility(facility);
        if(f){ rec.zone=f.zone; rec.rh=f.rh; rec.ch=f.ch; rec.zh=f.zh; if(!rec.partner) rec.partner=f.partner; if(!rec.type) rec.type=f.facility_type; }
        rec.updated_by=State.user.id; rec.updated_at=new Date().toISOString(); rec.created_by=State.user.id;
        recs.push(rec);
      });
      if(!recs.length){ toast('No valid rows','error'); return; }
      loadingStart();
      const { error } = await API.upsert('compliance', recs);
      loadingStop();
      if(error){ toast('Upload failed: '+error.message,'error'); return; }
      recs.forEach(rec=>{
        const idx = State.compliance.findIndex(x=>x.id===rec.id);
        if(idx>=0) State.compliance[idx] = rec; else State.compliance.unshift(rec);
      });
      audit('upload','compliance', file.name+' · '+recs.length+' records');
      toast(recs.length+' records uploaded','success');
      renderComplianceTable();
    }catch(e){ toast('Upload error: '+e.message,'error'); }
    input.value='';
  };
  reader.readAsBinaryString(file);
}

function renderBreach(){
  const root = $('m-breach');
  root.innerHTML = `
    <div id="breach_filter"></div>
    <div class="grid-stats" id="breach_kpis"></div>
    <div class="subtabs">
      <div class="subtab active" id="bsub-pending" onclick="breachSwitch('pending')">⏳ Pending RCA</div>

    </div>
    <div class="card"><div class="card-header"><div class="card-title" id="breach_title">Pending Breaches</div><div class="card-actions"><button class="btn btn-soft btn-sm" onclick="breachExport()">Export</button></div></div><div class="card-body no-pad"><div class="tbl-wrap" id="breach_tbl"></div></div></div>
  `;
  State._breachSub = State._breachSub || 'pending';

function breachSwitch(sub){
  State._breachSub = sub;
  ['pending','done'].forEach(s=>$('bsub-'+s).classList.toggle('active', s===sub));
  $('breach_title').textContent = sub==='pending' ? 'Pending Breaches' : 'Completed RCA';
  renderBreachData();
}
function renderBreachData(){
  const rows = applyGlobalFilters('bg', State.compliance).filter(r=>calcBreach(r.volume,r.connection)>0);
  // KPIs
  const totalBreaches = rows.length;
  const totalBreachQty = rows.reduce((s,r)=>s+calcBreach(r.volume,r.connection),0);
  const withRCA = rows.filter(r=>State.breachRCA.some(b=>b.compliance_id===r.id)).length;
  const pendingCount = totalBreaches - withRCA;
  setEl('breach_kpis', `
    <div class="kpi-card"><div class="kpi-label">Total Breaches</div><div class="kpi-value red">${NUM(totalBreaches)}</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Breach Qty</div><div class="kpi-value red">${NUM(totalBreachQty)}</div></div>
    <div class="kpi-card"><div class="kpi-label">RCA Pending</div><div class="kpi-value orange">${NUM(pendingCount)}</div></div>
    <div class="kpi-card"><div class="kpi-label">RCA Done</div><div class="kpi-value green">${NUM(withRCA)}</div></div>
  `);
  const sub = State._breachSub;
  let list = [];
  if(sub==='pending'){
    list = rows.filter(r=>!State.breachRCA.some(b=>b.compliance_id===r.id))
               .sort((a,b)=>calcBreach(b.volume,b.connection)-calcBreach(a.volume,a.connection));
    const body = list.map(r=>`<tr>
      <td>${fmtDate(r.date)}</td>
      <td><b>${esc(r.facility)}</b></td>
      <td>${esc(r.partner||'')}</td>
      <td class="num"><span class="chip ${tierClass(r.connection)}">${PCT(r.connection)}</span></td>
      <td class="num red">${NUM(calcBreach(r.volume,r.connection))}</td>
      <td><button class="btn btn-primary btn-sm" onclick="breachAddRCA('${esc(r.id)}')">Add RCA</button></td>
    </tr>`).join('') || '<tr><td colspan="6" class="center" style="padding:20px;color:var(--t3)">No pending RCA 🎉</td></tr>';

function breachAddRCA(complianceId){

      <div class="field required"><label>Category</label><select id="rca_cat">${RCA_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="field required"><label>Count (qty attributed)</label><input type="number" id="rca_count" value="${breachQty}" min="0"/></div>
      <div class="field"><label>Remarks</label><textarea id="rca_remarks" rows="3"></textarea></div>
    </div>`;

async function breachSaveRCA(complianceId, comp, modalEl){
  const rec = {
    compliance_id: complianceId,
    date: comp.date,
    facility: comp.facility,
    breach_qty: calcBreach(comp.volume, comp.connection),
    category: getEl('rca_cat'),
    count: N(getEl('rca_count')),
    remarks: S(getEl('rca_remarks')),
    updated_by: State.user.id,
    created_by: State.user.id
  };
  loadingStart();
  const { data, error } = await API.insert('breach_rca', rec);
  loadingStop();
  if(error){ toast('Save failed: '+error.message,'error'); return; }
  if(data && data[0]) State.breachRCA.unshift(data[0]);

  toast('RCA saved','success');
  modalEl.remove();
  renderBreachData();
}
function breachEditRCA(id){
  const b = State.breachRCA.find(x=>x.id===id); if(!b){ toast('Not found','error'); return; }
  const body = `<div class="banner info"><b>${esc(b.facility)}</b> · ${fmtDate(b.date)} · Breach: <b>${NUM(b.breach_qty)}</b></div>
    <div class="form-grid cols-1">
      <div class="field required"><label>Category</label><select id="rca_cat">${RCA_CATEGORIES.map(c=>`<option ${c===b.category?'selected':''}>${c}</option>`).join('')}</select></div>

    </div>`;

    { label:'Cancel', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Save', class:'btn-primary', onclick:m=>breachUpdateRCA(id, m) }
  ]});
}
async function breachUpdateRCA(id, modalEl){
  const patch = {
    category: getEl('rca_cat'),
    count: N(getEl('rca_count')),
    remarks: S(getEl('rca_remarks')),
    updated_by: State.user.id
  };
  loadingStart();
  const { data, error } = await API.update('breach_rca', id, patch);
  loadingStop();
  if(error){ toast('Update failed','error'); return; }
  const i = State.breachRCA.findIndex(x=>x.id===id);
  if(i>=0 && data && data[0]) State.breachRCA[i] = data[0];
  audit('update','breach_rca', id);
  toast('Updated','success');
  modalEl.remove();
  renderBreachData();
}
async function breachDeleteRCA(id){
  if(!confirm('Delete this RCA?')) return;
  loadingStart();
  const { error } = await API.remove('breach_rca', id);
  loadingStop();
  if(error){ toast('Delete failed','error'); return; }
  State.breachRCA = State.breachRCA.filter(x=>x.id!==id);
  audit('delete','breach_rca', id);
  toast('Deleted','success');
  renderBreachData();
}
function breachExport(){
  const rows = applyGlobalFilters('bg', State.compliance).filter(r=>calcBreach(r.volume,r.connection)>0);
  const out = rows.map(r=>{
    const rca = State.breachRCA.find(b=>b.compliance_id===r.id);
    return [fmtDate(r.date), r.facility, r.partner, r.rh, N(r.volume), N(r.connection), calcBreach(r.volume,r.connection), rca?rca.category:'PENDING', rca?N(rca.count):0, rca?rca.remarks:''];
  });
  exportXLSX(out, ['Date','Facility','Partner','RH','Volume','Conn%','Breach Qty','RCA Category','RCA Count','Remarks'], 'breach_rca');
}

function renderCallouts(){
  const root = $('m-callouts');
  root.innerHTML = `
    <div id="call_filter"></div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">Daily Callouts</div>
        <div class="card-actions">
          <button class="btn btn-soft btn-sm" onclick="callExport()">Export</button>
          <button class="btn btn-primary btn-sm" onclick="callEdit(null)">+ Add Callout</button>
        </div>
      </div>
      <div class="card-body no-pad"><div class="tbl-wrap" id="call_tbl"></div></div>
    </div>
  `;
  buildFilterBar('call_filter', 'cag', renderCalloutsTable);
  renderCalloutsTable();
}
function renderCalloutsTable(){
  // Filter by date range / facility scope (no zone — callouts may not have it)
  const dateFrom = getEl('cag_dateFrom'), dateTo = getEl('cag_dateTo'), month = getEl('cag_month');
  let rows = State.callouts.slice();
  if(month) rows = rows.filter(r=>isoToMonth(r.date)===month);
  if(dateFrom) rows = rows.filter(r=>r.date>=dateFrom);
  if(dateTo) rows = rows.filter(r=>r.date<=dateTo);
  rows.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const body = rows.map(r=>`<tr>
    <td>${fmtDate(r.date)}</td>
    <td><b>${esc(r.facility)}</b></td>
    <td class="small">${esc(r.remarks||'').slice(0,250)}</td>
    <td><button class="btn btn-ghost btn-sm" onclick="callEdit('${esc(r.id)}')">✎</button>${State.user.role!=='user'?'<button class="btn btn-ghost btn-sm" onclick="callDelete(\''+esc(r.id)+'\')">🗑</button>':''}</td>
  </tr>`).join('') || '<tr><td colspan="4" class="center" style="padding:20px;color:var(--t3)">No callouts</td></tr>';
  setEl('call_tbl', `<table class="dt"><thead><tr><th class="no-sort">Date</th><th class="no-sort">Facility</th><th class="no-sort">Remarks</th><th class="no-sort">Action</th></tr></thead><tbody>${body}</tbody></table>`);
}
function callEdit(id){
  const r = id ? State.callouts.find(x=>x.id===id) : { date:todayISO(), facility:'', remarks:'' };
  const facOpts = State.master.map(m=>`<option value="${esc(m.facility)}" ${norm(m.facility)===norm(r.facility)?'selected':''}>${esc(m.facility)}</option>`).join('');
  const body = `<div class="form-grid">
    <div class="field required"><label>Date</label><input type="date" id="ca_date" value="${esc(r.date)}"/></div>
    <div class="field required"><label>Facility</label><select id="ca_facility"><option value="">— Select —</option>${facOpts}</select></div>
  </div>
  <div class="field required" style="margin-top:12px"><label>Callout Remarks</label><textarea id="ca_remarks" rows="4">${esc(r.remarks||'')}</textarea></div>`;
  modal({ title:(id?'Edit':'Add')+' Callout', body, actions:[
    { label:'Cancel', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Save', class:'btn-primary', onclick:m=>callSave(id, m) }
  ]});
}
async function callSave(id, modalEl){
  const rec = {
    date: parseAnyDate(getEl('ca_date')),
    facility: norm(getEl('ca_facility')),
    remarks: S(getEl('ca_remarks')),
    updated_by: State.user.id
  };
  if(!rec.date || !rec.facility || !rec.remarks){ toast('Fill all fields','error'); return; }
  loadingStart();
  let res;
  if(id) res = await API.update('callouts', id, rec);
  else { rec.created_by = State.user.id; res = await API.insert('callouts', rec); }
  loadingStop();
  if(res.error){ toast('Save failed','error'); return; }
  if(res.data && res.data[0]){
    if(id){ const i = State.callouts.findIndex(x=>x.id===id); if(i>=0) State.callouts[i]=res.data[0]; }
    else State.callouts.unshift(res.data[0]);
  }
  audit(id?'update':'create','callouts', rec.facility);
  toast('Saved','success'); modalEl.remove(); renderCalloutsTable();
}
async function callDelete(id){
  if(!confirm('Delete this callout?')) return;
  loadingStart(); const { error } = await API.remove('callouts', id); loadingStop();
  if(error){ toast('Delete failed','error'); return; }
  State.callouts = State.callouts.filter(x=>x.id!==id);
  audit('delete','callouts', id); toast('Deleted','success'); renderCalloutsTable();
}
function callExport(){
  exportXLSX(State.callouts.map(r=>[fmtDate(r.date), r.facility, r.remarks]), ['Date','Facility','Remarks'], 'callouts');
}

/* ═══════════════════════════════════════════════════════════════════════

function renderRanking(){
  const root = $('m-ranking');
  root.innerHTML = `
    <div id="rank_filter"></div>
    <div class="card"><div class="card-header"><div class="card-title">Zone Ranking</div></div><div class="card-body no-pad"><div class="tbl-wrap" id="rank_zone"></div></div></div>
    <div class="card"><div class="card-header"><div class="card-title">RH Ranking</div></div><div class="card-body no-pad"><div class="tbl-wrap" id="rank_rh"></div></div></div>
    <div class="card"><div class="card-header"><div class="card-title">CH Ranking</div></div><div class="card-body no-pad"><div class="tbl-wrap" id="rank_ch"></div></div></div>
    <div class="card"><div class="card-header"><div class="card-title">Facility Ranking (Top 30)</div><div class="card-actions"><button class="btn btn-soft btn-sm" onclick="rankExportFac()">Export</button></div></div><div class="card-body no-pad"><div class="tbl-wrap" id="rank_fac"></div></div></div>
  `;
  buildFilterBar('rank_filter', 'rg', renderRankingData);
  renderRankingData();
}
function renderRankingData(){
  const rows = applyGlobalFilters('rg', State.compliance);
  function rankBy(key){
    const grp = {};
    rows.forEach(r=>{
      let v = r[key];
      if(!v && key!=='facility'){ const f=findFacility(r.facility); if(f) v = f[key==='ch'?'ch':key==='rh'?'rh':'zone']; }
      v = v || '—';
      (grp[v]=grp[v]||[]).push(r);
    });
    return Object.keys(grp).map(k=>{
      const a = aggCompliance(grp[k]);
      return { key:k, ...a, facilities:Object.keys(grp[k].reduce((o,r)=>{o[r.facility]=1;return o;},{})).length };
    }).sort((a,b)=>b.excComp-a.excComp);
  }
  function rankTbl(stats, labelCol){
    const body = stats.map((s,i)=>`<tr><td class="num">${i+1}</td><td><b>${esc(s.key)}</b></td><td class="num">${s.facilities}</td><td class="num">${NUM(s.records)}</td><td class="num"><span class="chip ${tierClass(s.actualComp)}">${PCT(s.actualComp)}</span></td><td class="num"><span class="chip ${tierClass(s.excComp)}">${PCT(s.excComp)}</span></td><td class="num">${PCT(s.avgBag)}</td><td class="num red">${NUM(s.breachQty)}</td><td class="num">${NUM(s.totVol)}</td></tr>`).join('') || '<tr><td colspan="9" class="center" style="padding:20px;color:var(--t3)">No data</td></tr>';
    return `<table class="dt"><thead><tr><th class="no-sort">Rank</th><th class="no-sort">${labelCol}</th><th class="no-sort">Facilities</th><th class="no-sort">Records</th><th class="no-sort">Actual%</th><th class="no-sort">⭐Exc%</th><th class="no-sort">Bag%</th><th class="no-sort">Breach Qty</th><th class="no-sort">Volume</th></tr></thead><tbody>${body}</tbody></table>`;
  }
  setEl('rank_zone', rankTbl(rankBy('zone'), 'Zone'));
  setEl('rank_rh', rankTbl(rankBy('rh'), 'RH'));
  setEl('rank_ch', rankTbl(rankBy('ch'), 'CH'));
  // Facilities (top 30)
  const facRanks = rankBy('facility').slice(0, 30);
  const body = facRanks.map((s,i)=>`<tr><td class="num">${i+1}</td><td><b>${esc(s.key)}</b></td><td class="num">${NUM(s.records)}</td><td class="num"><span class="chip ${tierClass(s.actualComp)}">${PCT(s.actualComp)}</span></td><td class="num"><span class="chip ${tierClass(s.excComp)}">${PCT(s.excComp)}</span></td><td class="num">${PCT(s.avgBag)}</td><td class="num red">${NUM(s.breachQty)}</td><td class="num">${NUM(s.totVol)}</td></tr>`).join('') || '<tr><td colspan="8" class="center" style="padding:20px;color:var(--t3)">No data</td></tr>';
  setEl('rank_fac', `<table class="dt"><thead><tr><th class="no-sort">Rank</th><th class="no-sort">Facility</th><th class="no-sort">Records</th><th class="no-sort">Actual%</th><th class="no-sort">⭐Exc%</th><th class="no-sort">Bag%</th><th class="no-sort">Breach Qty</th><th class="no-sort">Volume</th></tr></thead><tbody>${body}</tbody></table>`);
}
function rankExportFac(){
  const rows = applyGlobalFilters('rg', State.compliance);
  const byFac = {}; rows.forEach(r=>{ (byFac[r.facility]=byFac[r.facility]||[]).push(r); });
  const out = Object.keys(byFac).map(f=>{ const a=aggCompliance(byFac[f]); return [f,a.records,a.totVol,a.actualComp,a.excComp,a.avgBag,a.breachQty]; });
  out.sort((a,b)=>b[4]-a[4]);
  exportXLSX(out, ['Facility','Records','Volume','Actual%','Exc%','Bag%','Breach Qty'], 'facility_ranking');
}

async function codSave(id, modalEl){
  const rec = {
    date: parseAnyDate(getEl('cd_date')),
    facility: norm(getEl('cd_facility')),
    cod_qty: N(getEl('cd_qty')),
    remarks: S(getEl('cd_remarks')),
    updated_by: State.user.id
  };
  if(!rec.date||!rec.facility){ toast('Date and facility required','error'); return; }
  loadingStart();
  let res;
  if(id) res = await API.update('cod_data', id, rec);
  else { rec.created_by = State.user.id; res = await API.upsert('cod_data', rec); }
  loadingStop();
  if(res.error){ toast('Save failed: '+res.error.message,'error'); return; }
  if(res.data && res.data[0]){
    if(id){ const i=State.cod.findIndex(x=>x.id===id); if(i>=0) State.cod[i]=res.data[0]; }
    else {
      const existing = State.cod.findIndex(x=>x.date===rec.date && norm(x.facility)===rec.facility);
      if(existing>=0) State.cod[existing] = res.data[0]; else State.cod.unshift(res.data[0]);
    }
  }
  audit(id?'update':'create','cod_data', rec.facility);
  toast('Saved','success'); modalEl.remove(); renderCODData();

  toast('Deleted','success'); renderCODData();
}
function codExport(){
  exportXLSX(State.cod.map(r=>[fmtDate(r.date), r.facility, N(r.cod_qty), r.remarks]), ['Date','Facility','COD Qty','Remarks'], 'cod');
}
