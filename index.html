    <div class="card"><div class="card-header"><div class="card-title">PVA — Partner × Facility Volume Pivot</div><div class="card-actions"><button class="btn btn-soft btn-sm" onclick="pvaExport()">Export</button></div></div><div class="card-body no-pad"><div class="tbl-wrap" id="pva_tbl"></div></div></div>
  `;
  buildFilterBar('pva_filter', 'pvg', renderPVAData);
  renderPVAData();
}
function renderPVAData(){
  const rows = applyGlobalFilters('pvg', State.compliance);
  // Pivot: partner (rows) × facility (cols), value = SUM(volume)
  const partners = uniq(rows.map(r=>r.partner||'—'));
  const facilities = uniq(rows.map(r=>r.facility));
  const matrix = {};
  rows.forEach(r=>{
    const p = r.partner||'—'; const f = r.facility;
    matrix[p] = matrix[p] || {};
    matrix[p][f] = (matrix[p][f]||0) + N(r.volume);
  });
  if(!partners.length){ setEl('pva_tbl', '<div class="empty-state"><div class="em-icon">📈</div><h3>No PVA data</h3></div>'); return; }
  const head = `<thead><tr><th class="no-sort">Partner</th>${facilities.map(f=>`<th class="no-sort">${esc(f)}</th>`).join('')}<th class="no-sort">Total</th></tr></thead>`;
  const body = partners.map(p=>{
    let total = 0;
    const cells = facilities.map(f=>{ const v = (matrix[p]||{})[f] || 0; total += v; return `<td class="num">${v?NUM(v):'—'}</td>`; }).join('');
    return `<tr><td><b>${esc(p)}</b></td>${cells}<td class="num"><b>${NUM(total)}</b></td></tr>`;
  }).join('');
  setEl('pva_tbl', `<table class="dt">${head}<tbody>${body}</tbody></table>`);
}
function pvaExport(){
  const rows = applyGlobalFilters('pvg', State.compliance);
  const partners = uniq(rows.map(r=>r.partner||'—'));
  const facilities = uniq(rows.map(r=>r.facility));
  const matrix = {};
  rows.forEach(r=>{ const p=r.partner||'—'; matrix[p]=matrix[p]||{}; matrix[p][r.facility]=(matrix[p][r.facility]||0)+N(r.volume); });
  const out = [['Partner', ...facilities, 'Total']];
  partners.forEach(p=>{
    let total = 0;
    const row = [p, ...facilities.map(f=>{ const v=(matrix[p]||{})[f]||0; total+=v; return v; }), total];
    out.push(row);
  });
  const ws = XLSX.utils.aoa_to_sheet(out);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'PVA');
  XLSX.writeFile(wb, 'pva_'+todayISO()+'.xlsx');
}
</script>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   29. DOD MODULE — Excel-style 157-column raw sheet renderer
   ═══════════════════════════════════════════════════════════════════════ */
function colLetter(n){
  // 1=A, 26=Z, 27=AA, etc
  let s = '';
  while(n>0){ const m = (n-1)%26; s = String.fromCharCode(65+m) + s; n = Math.floor((n-1)/26); }
  return s;
}
function colClass(n){
  if(n===DOD_FACILITY_COL) return '';
  if(n===DOD_SEPARATOR_COL) return 'col-separator';
  if(n>=DOD_FORWARD_START && n<=DOD_FORWARD_END) return 'col-forward';
  if(n>=DOD_RTO_START && n<=DOD_RTO_END) return 'col-rto';
  return '';
}
function colLetterClass(n){
  if(n===DOD_SEPARATOR_COL) return 'col-letter-separator';
  if(n>=DOD_FORWARD_START && n<=DOD_FORWARD_END) return 'col-letter-forward';
  if(n>=DOD_RTO_START && n<=DOD_RTO_END) return 'col-letter-rto';
  return '';
}

function renderDOD(){
  const root = $('m-dod');
  root.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">DOD Performance Tracker</div>
        <div class="card-actions">
          <label class="btn btn-soft btn-sm" style="cursor:pointer">Upload XLSX/CSV
            <input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="dodUpload(this)"/>
          </label>
          <button class="btn btn-soft btn-sm" onclick="dodLocationMaster()">📍 Location Master</button>
          <button class="btn btn-soft btn-sm" onclick="dodColumnManager()">📊 Column Manager</button>
        </div>
      </div>
      <div class="card-body">
        <div class="filter-bar">
          <span class="filter-label">Report Date</span>
          <select class="filter-input" id="dod_date" onchange="dodLoadSheet()" style="min-width:180px">
            <option value="">— Select date —</option>
            ${State.dodIndex.map(d=>`<option value="${d.report_date}">${fmtDate(d.report_date)} (${d.total_rows} rows)</option>`).join('')}
          </select>
          <span class="filter-label">Search</span>
          <input type="text" class="filter-input" id="dod_search" placeholder="Filter by facility…" oninput="dodApplySearch()"/>
          <button class="filter-reset" onclick="dodResetFilters()">Reset</button>
          <span style="margin-left:auto;font-size:12px;color:var(--t2)" id="dod_meta"></span>
        </div>
        <div class="banner info" id="dod_emptyMsg" style="display:${State.dodIndex.length?'none':'block'}">
          <b>No DOD sheets uploaded yet.</b> Upload an XLSX/CSV file using the button above. The sheet should have 157 columns (J=Facility, K-CE=Forward time buckets, CF=separator, CG-FA=RTO time buckets) and 5 frozen header rows.
        </div>
        <div id="dod_grid"></div>
      </div>
    </div>
  `;
  // Auto-load latest sheet
  if(State.dodIndex.length && !State.dodSheet){
    $('dod_date').value = State.dodIndex[0].report_date;
    dodLoadSheet();
  } else if(State.dodSheet){
    $('dod_date').value = State.dodSheet.report_date;
    dodRenderGrid();
  }
}

async function dodUpload(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      loadingStart();
      const wb = XLSX.read(e.target.result, { type:'binary', cellDates:true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      // Parse as 2-D array
      const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:false });
      if(!rows.length){ toast('Empty file','error'); loadingStop(); input.value=''; return; }
      // Pad rows to 157 columns
      const totalCols = Math.max(157, ...rows.map(r=>r.length));
      const padded = rows.map(r=>{ const out = new Array(totalCols).fill(''); for(let i=0;i<r.length;i++) out[i] = r[i]==null?'':String(r[i]); return out; });
      // Prompt for report date (default = today)
      const defaultDate = todayISO();
      const dateInput = prompt('Report date for this sheet (YYYY-MM-DD):', defaultDate);
      const reportDate = parseAnyDate(dateInput || defaultDate);
      if(!reportDate){ loadingStop(); input.value=''; return; }
      const rec = {
        report_date: reportDate,
        file_name: file.name,
        rows: padded,
        total_cols: totalCols,
        total_rows: padded.length,
        uploaded_by: State.user.id,
        uploaded_at: new Date().toISOString()
      };
      const { error } = await API.upsert('dod_uploads', rec);
      loadingStop();
      if(error){ toast('Upload failed: '+error.message,'error'); input.value=''; return; }
      // Update local index
      const idx = State.dodIndex.findIndex(x=>x.report_date===reportDate);
      const idxRec = { report_date:reportDate, file_name:file.name, total_rows:padded.length, total_cols:totalCols, uploaded_at:rec.uploaded_at };
      if(idx>=0) State.dodIndex[idx] = idxRec; else State.dodIndex.unshift(idxRec);
      State.dodIndex.sort((a,b)=>(b.report_date||'').localeCompare(a.report_date||''));
      State.dodSheet = rec;
      audit('upload','dod', file.name+' · '+reportDate);
      toast('Uploaded: '+padded.length+' rows × '+totalCols+' cols','success');
      renderDOD();
    }catch(e){
      loadingStop();
      toast('Upload error: '+e.message,'error');
      console.error(e);
    }
    input.value='';
  };
  reader.readAsBinaryString(file);
}

async function dodLoadSheet(){
  const date = getEl('dod_date');
  if(!date){ State.dodSheet = null; $('dod_grid').innerHTML=''; return; }
  loadingStart();
  try{
    const { data, error } = await sb.from('dod_uploads').select('*').eq('report_date', date).single();
    if(error || !data){ toast('Failed to load sheet','error'); loadingStop(); return; }
    State.dodSheet = data;
    // Load column prefs
    const { data: prefs } = await sb.from('dod_column_prefs').select('*').eq('report_date', date).maybeSingle();
    State.dodColPrefs = prefs || { hidden_cols:[], filter_mapping:{status:null,zone:null,rh:null}, sort:null };
    dodRenderGrid();
  }catch(e){ toast('Load error: '+e.message,'error'); }
  finally{ loadingStop(); }
}

function dodRenderGrid(){
  if(!State.dodSheet){ $('dod_grid').innerHTML=''; return; }
  const sheet = State.dodSheet;
  const cols = sheet.total_cols || 157;
  const hidden = (State.dodColPrefs && State.dodColPrefs.hidden_cols) || [];
  const visible = []; for(let c=1; c<=cols; c++){ if(hidden.indexOf(c)<0) visible.push(c); }
  // Header letters row
  const colHeaders = visible.map(c=>`<th class="${colLetterClass(c)}" onclick="dodSortCol(${c})" title="${colLetter(c)}">${colLetter(c)}</th>`).join('');
  // Frozen header rows (first 5)
  const frozenRows = [];
  for(let r=0; r<DOD_FROZEN_HEADER_ROWS; r++){
    const cells = visible.map(c=>{
      const cellClass = (c===DOD_FACILITY_COL) ? 'col-j' : colClass(c);
      const val = (sheet.rows[r] && sheet.rows[r][c-1]) || '';
      return `<td class="${cellClass}"><div class="cell-inner" title="${esc(String(val))}">${esc(String(val))}</div></td>`;
    }).join('');
    frozenRows.push(`<tr class="frozen-row frozen-row-${r+1}"><td class="rownum">${r+1}</td>${cells}</tr>`);
  }
  // Body rows (from row 5 onward)
  const search = (getEl('dod_search')||'').toLowerCase();
  const sort = State.dodColPrefs && State.dodColPrefs.sort;
  let bodyRows = sheet.rows.slice(DOD_FROZEN_HEADER_ROWS).map((row, i)=>({ rownum: DOD_FROZEN_HEADER_ROWS+i+1, data: row }));
  if(search){ bodyRows = bodyRows.filter(r=>{ const fac = (r.data[DOD_FACILITY_COL-1]||'').toLowerCase(); return fac.includes(search); }); }
  if(sort){
    const c = sort.col, dir = sort.dir;
    bodyRows.sort((a,b)=>{
      const va = a.data[c-1]||'', vb = b.data[c-1]||'';
      const na = parseFloat(va), nb = parseFloat(vb);
      if(!isNaN(na) && !isNaN(nb)) return dir==='asc' ? na-nb : nb-na;
      return dir==='asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
    });
  }
  // Cap to first 1000 visible rows for perf
  const cap = 1000;
  const totalVisible = bodyRows.length;
  bodyRows = bodyRows.slice(0, cap);
  const dataRows = bodyRows.map(r=>{
    const cells = visible.map(c=>{
      const cellClass = (c===DOD_FACILITY_COL) ? 'col-j' : colClass(c);
      const val = r.data[c-1] || '';
      return `<td class="${cellClass}"><div class="cell-inner" title="${esc(String(val))}">${esc(String(val))}</div></td>`;
    }).join('');
    return `<tr><td class="rownum">${r.rownum}</td>${cells}</tr>`;
  }).join('');
  const html = `<div class="dod-grid-wrap">
    <table class="dod-grid">
      <thead><tr class="col-letters"><th class="rownum">#</th>${colHeaders}</tr></thead>
      <tbody>${frozenRows.join('')}${dataRows}</tbody>
    </table>
  </div>`;
  $('dod_grid').innerHTML = html;
  setEl('dod_meta', `${sheet.file_name} · ${sheet.total_rows} rows × ${cols} cols${totalVisible>cap?' · showing first '+cap+' of '+totalVisible:''}`);
}

function dodApplySearch(){ dodRenderGrid(); }
function dodResetFilters(){
  $('dod_search').value = '';
  if(State.dodColPrefs) State.dodColPrefs.sort = null;
  dodRenderGrid();
}

async function dodSortCol(c){
  const prefs = State.dodColPrefs = State.dodColPrefs || { hidden_cols:[], filter_mapping:{status:null,zone:null,rh:null}, sort:null };
  if(!prefs.sort || prefs.sort.col!==c) prefs.sort = { col:c, dir:'asc' };
  else if(prefs.sort.dir==='asc') prefs.sort.dir = 'desc';
  else prefs.sort = null;
  await dodSavePrefs();
  dodRenderGrid();
}

async function dodSavePrefs(){
  if(!State.dodSheet) return;
  const rec = {
    report_date: State.dodSheet.report_date,
    hidden_cols: (State.dodColPrefs && State.dodColPrefs.hidden_cols) || [],
    filter_mapping: (State.dodColPrefs && State.dodColPrefs.filter_mapping) || { status:null,zone:null,rh:null },
    sort: (State.dodColPrefs && State.dodColPrefs.sort) || null,
    updated_by: State.user.id
  };
  await API.upsert('dod_column_prefs', rec);
}

function dodColumnManager(){
  if(!State.dodSheet){ toast('Load a sheet first','warn'); return; }
  const cols = State.dodSheet.total_cols;
  const hidden = (State.dodColPrefs && State.dodColPrefs.hidden_cols) || [];
  // Get the header row for friendly names
  const headerRow = (State.dodSheet.rows[4] || State.dodSheet.rows[0] || []);
  let html = `<div class="banner info">Toggle which columns are visible. Forward zone = K-CE (blue), RTO zone = CG-FA (orange).</div>`;
  html += `<div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn btn-soft btn-sm" onclick="dodCMAll(true)">Show All</button><button class="btn btn-soft btn-sm" onclick="dodCMAll(false)">Hide All (except J)</button><button class="btn btn-soft btn-sm" onclick="dodCMForward()">Forward Only</button><button class="btn btn-soft btn-sm" onclick="dodCMRTO()">RTO Only</button></div>`;
  html += `<div style="max-height:400px;overflow:auto;border:1px solid var(--border);border-radius:6px">`;
  html += `<table class="dt" style="font-size:12px"><thead><tr><th class="no-sort">Show</th><th class="no-sort">Col</th><th class="no-sort">Header (Row 5)</th><th class="no-sort">Zone</th></tr></thead><tbody>`;
  for(let c=1; c<=cols; c++){
    const isHidden = hidden.indexOf(c)>=0;
    const header = (headerRow[c-1] || '').toString().slice(0, 40);
    let zone = '';
    if(c===DOD_FACILITY_COL) zone = '<span class="tag">Facility</span>';
    else if(c===DOD_SEPARATOR_COL) zone = '<span class="tag">Sep</span>';
    else if(c>=DOD_FORWARD_START && c<=DOD_FORWARD_END) zone = '<span class="chip" style="background:#dbeafe;color:#1e40af">Forward</span>';
    else if(c>=DOD_RTO_START && c<=DOD_RTO_END) zone = '<span class="chip" style="background:#fed7aa;color:#9a3412">RTO</span>';
    else zone = '<span class="tag">Other</span>';
    html += `<tr><td class="center"><input type="checkbox" data-col="${c}" ${isHidden?'':'checked'} ${c===DOD_FACILITY_COL?'disabled':''}/></td><td class="num"><b>${colLetter(c)}</b></td><td>${esc(header)}</td><td>${zone}</td></tr>`;
  }
  html += '</tbody></table></div>';
  modal({ title:'Column Manager', body:html, size:'lg', actions:[
    { label:'Cancel', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Apply', class:'btn-primary', onclick:m=>dodCMApply(m) }
  ]});
}
function dodCMAll(show){
  document.querySelectorAll('[data-col]').forEach(cb=>{ if(cb.disabled) return; cb.checked = show; });
}
function dodCMForward(){
  document.querySelectorAll('[data-col]').forEach(cb=>{
    if(cb.disabled) return;
    const c = parseInt(cb.dataset.col);
    cb.checked = (c===DOD_FACILITY_COL) || (c>=DOD_FORWARD_START && c<=DOD_FORWARD_END);
  });
}
function dodCMRTO(){
  document.querySelectorAll('[data-col]').forEach(cb=>{
    if(cb.disabled) return;
    const c = parseInt(cb.dataset.col);
    cb.checked = (c===DOD_FACILITY_COL) || (c>=DOD_RTO_START && c<=DOD_RTO_END);
  });
}
async function dodCMApply(modalEl){
  const hidden = [];
  document.querySelectorAll('[data-col]').forEach(cb=>{ if(!cb.checked) hidden.push(parseInt(cb.dataset.col)); });
  State.dodColPrefs = State.dodColPrefs || { hidden_cols:[], filter_mapping:{}, sort:null };
  State.dodColPrefs.hidden_cols = hidden;
  await dodSavePrefs();
  modalEl.remove();
  toast('Applied','success');
  dodRenderGrid();
}

function dodLocationMaster(){
  const body = `<div class="banner info">DOD module uses the unified <b>Master Facility</b> table. Edit facilities in the Admin Panel → Master tab.</div>
    <div class="tbl-wrap" style="max-height:400px">
      <table class="dt"><thead><tr><th class="no-sort">Facility</th><th class="no-sort">Type</th><th class="no-sort">Zone</th><th class="no-sort">RH</th><th class="no-sort">CH</th><th class="no-sort">Partner</th></tr></thead><tbody>
      ${State.master.map(m=>`<tr><td><b>${esc(m.facility)}</b></td><td>${esc(m.facility_type)}</td><td>${esc(m.zone||'')}</td><td>${esc(m.rh||'')}</td><td>${esc(m.ch||'')}</td><td>${esc(m.partner||'')}</td></tr>`).join('') || '<tr><td colspan="6" class="center" style="padding:20px;color:var(--t3)">No facilities — add via Admin Panel</td></tr>'}
      </tbody></table>
    </div>`;
  modal({ title:'Location Master', body, size:'lg', actions:[
    { label:'Close', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Go to Admin', class:'btn-primary', onclick:m=>{ m.remove(); if(State.user.role==='super') switchTab('admin'); else toast('Only superadmin can edit master','warn'); } }
  ]});
}
</script>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   30. ADMIN PANEL — Users, Master Facility, Audit Log
   ═══════════════════════════════════════════════════════════════════════ */
function renderAdmin(){
  if(!State.user || State.user.role!=='super'){
    $('m-admin').innerHTML = '<div class="banner error">Access denied. Superadmin only.</div>';
    return;
  }
  const root = $('m-admin');
  root.innerHTML = `
    <div class="subtabs">
      <div class="subtab active" id="adm-sub-users"  onclick="adminSwitch('users')">👥 Users</div>
      <div class="subtab" id="adm-sub-master"        onclick="adminSwitch('master')">🏭 Master Facility</div>

      <div class="subtab" id="adm-sub-system"        onclick="adminSwitch('system')">⚙️ System</div>
    </div>
    <div id="adm_body"></div>
  `;
  State._admSub = State._admSub || 'users';

}
function adminSwitch(sub){

  ['users','master','audit','system'].forEach(s=>$('adm-sub-'+s).classList.toggle('active', s===sub));
  adminRenderBody();
}
function adminRenderBody(){

  if(sub==='users') return adminRenderUsers();
  if(sub==='master') return adminRenderMaster();
  if(sub==='audit') return adminRenderAudit();

}

/* ── 30.1 USERS ──────────────────────────────────────────────────────── */
function adminRenderUsers(){
  $('adm_body').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="card-title">User Profiles (${State.users.length})</div>
        <div class="card-actions">
          <button class="btn btn-soft btn-sm" onclick="adminInviteUser()">+ Invite User</button>
          <button class="btn btn-soft btn-sm" onclick="adminRefreshUsers()">↻ Refresh</button>
        </div>
      </div>
      <div class="card-body no-pad"><div class="tbl-wrap" id="adm_users_tbl"></div></div>
    </div>
    <div class="banner info" style="margin-top:14px">
      <b>How to create a new user:</b>
      1. Go to Supabase Dashboard → Authentication → Users → "Add user". Set their email + temporary password.
      2. The system will auto-create a profile row here with role='user'.
      3. Edit their row below to set role / zone / CH / locations.
    </div>
  `;
  const body = State.users.map(u=>`<tr>
    <td><b>${esc(u.name||'—')}</b><div style="font-size:11px;color:var(--t3)">${esc(u.email)}</div></td>
    <td class="small">${esc(u.mobile||'—')}</td>
    <td><span class="chip ${u.role==='super'?'cyan':u.role==='admin'?'orange':'gray'}">${esc(u.role)}</span></td>
    <td>${esc(u.designation||'')}</td>
    <td>${esc(u.zone||'')}</td>
    <td>${esc(u.ch||'')}</td>
    <td class="small">${(u.locations||[]).length?(u.locations.length+' loc'):''}</td>
    <td>${u.active===false?'<span class="chip red">Inactive</span>':'<span class="chip green">Active</span>'}</td>
    <td>
      <button class="btn btn-ghost btn-sm" onclick="adminEditUser('${esc(u.id)}')">✎</button>
      ${u.id!==State.user.id?'<button class="btn btn-ghost btn-sm" onclick="adminToggleUser(\''+esc(u.id)+'\')">'+(u.active===false?'✓ Activate':'✕ Deactivate')+'</button>':''}
    </td>
  </tr>`).join('') || '<tr><td colspan="9" class="center" style="padding:20px;color:var(--t3)">No users</td></tr>';
  setEl('adm_users_tbl', `<table class="dt"><thead><tr><th class="no-sort">User</th><th class="no-sort">Mobile</th><th class="no-sort">Role</th><th class="no-sort">Designation</th><th class="no-sort">Zone</th><th class="no-sort">CH</th><th class="no-sort">Locations</th><th class="no-sort">Status</th><th class="no-sort">Action</th></tr></thead><tbody>${body}</tbody></table>`);
}
async function adminRefreshUsers(){
  loadingStart();
  State.users = await API.listAll('user_profiles', { orderBy:'name' });
  loadingStop();
  adminRenderUsers();
}
function adminInviteUser(){
  const body = `<div class="banner warn">User accounts must be created in <b>Supabase Dashboard → Authentication → Users</b>. The profile row will appear here automatically via database trigger. Then edit it to set role and scope.</div>
    <ol style="padding-left:18px;line-height:1.8;font-size:13px">
      <li>Open Supabase Dashboard → Authentication → Users</li>
      <li>Click "Add user" → "Create new user"</li>
      <li>Enter email + temp password, enable "Auto Confirm User"</li>
      <li>Copy the user UUID</li>
      <li>Click "Refresh" on this page</li>
      <li>Edit the new row to set role, designation, zone, CH, locations</li>
      <li>Share email + temp password with the user; ask them to change password on first login</li>
    </ol>`;
  modal({ title:'Invite New User', body, actions:[{ label:'OK', class:'btn-primary', onclick:m=>m.remove() }]});
}
function adminEditUser(id){
  const u = State.users.find(x=>x.id===id); if(!u){ toast('User not found','error'); return; }
  const zones = uniq(State.master.map(m=>m.zone).concat(['All']));
  const chs   = uniq(State.master.map(m=>m.ch));
  const body = `<div class="form-grid">

async function adminSaveUser(id, modalEl){
  const patch = {
    name: S(getEl('au_name')),
    mobile: S(getEl('au_mobile')) || null,
    role: getEl('au_role'),
    designation: getEl('au_des') || null,
    zone: getEl('au_zone') || 'All',
    ch: S(getEl('au_ch')) || null,
    active: getEl('au_active')==='true',
    locations: S(getEl('au_locs')).split(',').map(s=>norm(s)).filter(Boolean)
  };
  loadingStart();
  const { data, error } = await API.update('user_profiles', id, patch);
  loadingStop();
  if(error){ toast('Save failed: '+error.message,'error'); return; }
  if(data && data[0]){ const i = State.users.findIndex(x=>x.id===id); if(i>=0) State.users[i] = data[0]; }
  audit('update','user', S(getEl('au_name')));
  toast('User saved','success'); modalEl.remove(); adminRenderUsers();
}
async function adminToggleUser(id){
  const u = State.users.find(x=>x.id===id); if(!u) return;
  if(!confirm((u.active===false?'Activate':'Deactivate')+' '+u.name+'?')) return;
  loadingStart();
  const { error } = await API.update('user_profiles', id, { active: !u.active });
  loadingStop();
  if(error){ toast('Failed','error'); return; }
  u.active = !u.active;
  audit('toggle','user', u.name+' → '+(u.active?'active':'inactive'));
  toast('Updated','success'); adminRenderUsers();
}

  `;

}
function adminMasterEdit(id){
  const m = id ? State.master.find(x=>x.id===id) : { facility:'', facility_type:'LM-SC', zone:'', rh:'', ch:'', zh:'', partner:'', active:true };
  const body = `<div class="form-grid">
    <div class="field required"><label>Facility Code</label><input id="mf_facility" value="${esc(m.facility)}" ${id?'readonly style="background:var(--surface-3)"':''}/></div>
    <div class="field required"><label>Facility Type</label><select id="mf_type">${FACILITY_TYPES.map(t=>`<option ${t===m.facility_type?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="field required"><label>Zone</label><input id="mf_zone" value="${esc(m.zone||'')}"/></div>
    <div class="field"><label>RH</label><input id="mf_rh" value="${esc(m.rh||'')}"/></div>
    <div class="field"><label>CH</label><input id="mf_ch" value="${esc(m.ch||'')}"/></div>
    <div class="field"><label>ZH</label><input id="mf_zh" value="${esc(m.zh||'')}"/></div>
    <div class="field"><label>Partner</label><input id="mf_partner" value="${esc(m.partner||'')}"/></div>
    <div class="field"><label>Active</label><select id="mf_active"><option value="true" ${m.active!==false?'selected':''}>Yes</option><option value="false" ${m.active===false?'selected':''}>No</option></select></div>
  </div>`;
  modal({ title:(id?'Edit':'Add')+' Facility', body, actions:[
    { label:'Cancel', class:'btn-soft', onclick:m=>m.remove() },
    { label:'Save', class:'btn-primary', onclick:m=>adminMasterSave(id, m) }
  ]});
}
async function adminMasterSave(id, modalEl){
  const rec = {
    facility: norm(getEl('mf_facility')),
    facility_type: getEl('mf_type'),
    zone: S(getEl('mf_zone')),
    rh: S(getEl('mf_rh')) || null,
    ch: S(getEl('mf_ch')) || null,
    zh: S(getEl('mf_zh')) || null,
    partner: S(getEl('mf_partner')) || null,
    active: getEl('mf_active')==='true'
  };
  if(!rec.facility || !rec.zone){ toast('Facility and Zone required','error'); return; }
  loadingStart();
  let res;
  if(id) res = await API.update('master_facility', id, rec);
  else { rec.created_by = State.user.id; res = await API.upsert('master_facility', rec); }
  loadingStop();
  if(res.error){ toast('Save failed: '+res.error.message,'error'); return; }
  if(res.data && res.data[0]){
    if(id){ const i=State.master.findIndex(x=>x.id===id); if(i>=0) State.master[i]=res.data[0]; }
    else {
      const existing = State.master.findIndex(x=>norm(x.facility)===rec.facility);
      if(existing>=0) State.master[existing] = res.data[0]; else State.master.push(res.data[0]);
    }
  }
  audit(id?'update':'create','master_facility', rec.facility);
  toast('Saved','success'); modalEl.remove(); adminRenderMaster();
}
async function adminMasterDelete(id){
  const m = State.master.find(x=>x.id===id); if(!m) return;
  if(!confirm('Delete '+m.facility+'? Compliance records will keep working but lookups will fail.')) return;
  loadingStart(); const { error } = await API.remove('master_facility', id); loadingStop();
  if(error){ toast('Delete failed','error'); return; }
  State.master = State.master.filter(x=>x.id!==id);
  audit('delete','master_facility', m.facility);
  toast('Deleted','success'); adminRenderMaster();
}
function adminMasterTemplate(){
  const data = [['facility','facility_type','zone','rh','ch','zh','partner','active'],
                ['SAMPLE_FAC_01','LM-SC','South','R. Kumar','A. Singh','V. Rao','Valmo',true]];
  const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Master'); XLSX.writeFile(wb, 'master_facility_template.xlsx');
}
function adminMasterExport(){
  const out = State.master.map(m=>[m.facility, m.facility_type, m.zone, m.rh, m.ch, m.zh, m.partner, m.active]);
  exportXLSX(out, ['facility','facility_type','zone','rh','ch','zh','partner','active'], 'master_facility');
}
function adminMasterUpload(input){
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const wb = XLSX.read(e.target.result, { type:'binary' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval:'' });
      const recs = [];
      rows.forEach(row=>{
        const facility = norm(row.facility||row.Facility||'');
        if(!facility) return;
        const type = row.facility_type||row.type||'';
        if(FACILITY_TYPES.indexOf(type)<0) return;
        recs.push({
          facility,
          facility_type: type,
          zone: S(row.zone||row.Zone),
          rh: S(row.rh||row.RH) || null,
          ch: S(row.ch||row.CH) || null,
          zh: S(row.zh||row.ZH) || null,
          partner: S(row.partner||row.Partner) || null,
          active: row.active===false || row.active==='false' ? false : true,
          created_by: State.user.id
        });
      });
      if(!recs.length){ toast('No valid rows','error'); input.value=''; return; }
      loadingStart();
      const { error } = await API.upsert('master_facility', recs);
      loadingStop();
      if(error){ toast('Upload failed: '+error.message,'error'); input.value=''; return; }
      State.master = await API.listAll('master_facility', { orderBy:'facility' });
      audit('upload','master_facility', recs.length+' rows');
      toast(recs.length+' facilities saved','success');
      adminRenderMaster();
    }catch(e){ toast('Error: '+e.message,'error'); }
    input.value='';
  };
  reader.readAsBinaryString(file);
}

/* ═══════════════════════════════════════════════════════════════════════
   31. BOOT SEQUENCE
   ═══════════════════════════════════════════════════════════════════════ */
async function boot(){
  loadAudit();
  tickClock();
  const ok = initSupabase();
  if(!ok){
    $('loginErr').textContent = 'Supabase not configured. Edit SUPABASE_URL and SUPABASE_ANON in the HTML source, then refresh.';
    $('loginErr').style.display = 'block';
    return;
  }
  // Try restore session
  const restored = await tryRestoreSession();
  if(!restored){
    $('loginScreen').style.display = 'grid';
    $('loginId').focus();
  }
  // Auth state change handler
  if(sb){
    sb.auth.onAuthStateChange((event, session)=>{
      if(event==='SIGNED_OUT' && State.user){ location.reload(); }
    });
  }
}

document.addEventListener('DOMContentLoaded', boot);
